# Google Cloud Build configuration for automated deployment
# This file enables "Connect Repository" deployment in Cloud Run

steps:
  # Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/best-galaxy-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/best-galaxy-backend:latest'
      - '.'
    id: 'build-backend'

  # Build Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/best-galaxy-backend:$COMMIT_SHA'
    id: 'push-backend'

  # Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:$COMMIT_SHA'
    id: 'push-frontend'

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'best-galaxy-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/best-galaxy-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'SUPABASE_URL=${_SUPABASE_URL},SUPABASE_KEY=${_SUPABASE_KEY},OPENAI_API_KEY=${_OPENAI_API_KEY},STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET}'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
    id: 'deploy-backend'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'best-galaxy-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'BACKEND_URL=${_BACKEND_URL}'
      - '--max-instances'
      - '10'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
    id: 'deploy-frontend'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/best-galaxy-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/best-galaxy-backend:latest'
  - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/best-galaxy-frontend:latest'

# Substitution variables (set in Cloud Build trigger)
substitutions:
  _SUPABASE_URL: 'https://your-project.supabase.co'
  _SUPABASE_KEY: 'your-supabase-anon-key'
  _OPENAI_API_KEY: 'your-openai-key'
  _STRIPE_SECRET_KEY: 'your-stripe-secret'
  _STRIPE_WEBHOOK_SECRET: 'your-stripe-webhook-secret'
  _BACKEND_URL: 'https://best-galaxy-backend-xxxxx.run.app'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
